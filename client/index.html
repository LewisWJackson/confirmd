<!doctype html>
<html lang="en">
  <head>

    />
    <meta name="theme-color" content="#0d0d0d" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://confirmd.news" />

    <!-- OpenGraph -->
    <meta
      property="og:title"
      content="Confirmd | Know who to trust in crypto"
    />
    <meta
      property="og:description"
      content="Ground News for crypto. Track which YouTube creators are actually right about Bitcoin, Ethereum, and DeFi. Live accuracy leaderboard, claim verification, and bias detection."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://confirmd.news" />
    <meta property="og:image" content="https://confirmd.news/og-image.png" />
    <meta property="og:site_name" content="Confirmd" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@confirmd_app" />
    <meta
      name="twitter:title"
      content="Confirmd | Know who to trust in crypto"
    />
    <meta
      name="twitter:description"
      content="Ground News for crypto. Track which YouTube creators are actually right about Bitcoin, Ethereum, and DeFi. Live accuracy leaderboard, claim verification, and bias detection."
    />

    <!-- Favicon -->
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230891b2'/><path d='M25 52L42 69L75 36' stroke='white' stroke-width='10' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Non-blocking font load: preload triggers async fetch, onload swaps rel to stylesheet -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      />
    </noscript>
  </head>
  <body class="selection:bg-cyan-500/30">
    <div id="root">
      <!-- Inline critical content: provides an LCP candidate before JS loads -->
      <div
        style="
          position: fixed;
          inset: 0;
          background: #0d0d0d;
          display: flex;
          align-items: center;
          justify-content: center;
          z-index: 9999;
        "
        id="__loading"
      >
        <h1
          style="
            color: #e5e5e5;
            font-family: Inter, system-ui, sans-serif;
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 900;
            letter-spacing: -0.04em;
            line-height: 1;
            text-align: center;
            margin: 0;
            padding: 1rem;
          "
        >
          Know who to trust<br /><span style="color: #0891b2">in crypto.</span>
        </h1>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
