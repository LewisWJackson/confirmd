<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confirmd | See the Full Picture of Crypto News</title>
    <meta
      name="description"
      content="Confirmd is a crypto news aggregator that shows how multiple sources cover the same story. Compare source credibility, detect blindspots, and read with clarity."
    />
    <meta name="theme-color" content="#0891b2" />

    <!-- OpenGraph -->
    <meta
      property="og:title"
      content="Confirmd | See the Full Picture of Crypto News"
    />
    <meta
      property="og:description"
      content="Compare how multiple sources cover the same crypto story. Source credibility tiers, blindspot detection, and coverage comparison — like Ground News for crypto."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://confirmd.news" />
    <meta property="og:image" content="https://confirmd.news/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Confirmd | See the Full Picture of Crypto News"
    />
    <meta
      name="twitter:description"
      content="Compare how multiple sources cover the same crypto story. Source credibility tiers, blindspot detection, and coverage comparison — like Ground News for crypto."
    />
    <meta name="twitter:image" content="https://confirmd.news/og-image.png" />

    <!-- Favicon -->
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230891b2'/><path d='M25 52L42 69L75 36' stroke='white' stroke-width='10' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>"
    />

    <!-- Non-blocking font load: preload triggers async fetch, onload swaps rel to stylesheet -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      />
    </noscript>
  </head>
  <body class="selection:bg-cyan-500/30">
    <div id="root">
      <!-- Inline LCP candidate: visible hero text before JS hydrates.
           Uses min-height (not position:fixed) so Chrome tracks it as LCP.
           React's createRoot().render() replaces #root children on first commit. -->
      <div
        id="__loading"
        style="
          min-height: 100dvh;
          background: #0d0d0d;
          display: flex;
          align-items: center;
          justify-content: center;
        "
      >
        <h1
          style="
            color: #e5e5e5;
            font-family: Inter, system-ui, sans-serif;
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 900;
            letter-spacing: -0.04em;
            line-height: 1;
            text-align: center;
            margin: 0;
            padding: 1rem;
          "
        >
          Know who to trust<br /><span style="color: #0891b2">in crypto.</span>
        </h1>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
